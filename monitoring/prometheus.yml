# Prometheus scrape configuration.
#
# The backend runs on the HOST (via `npm run start:dev`), not in this compose
# network, so Prometheus reaches it through `host.docker.internal`, which Docker
# Desktop maps to the host machine. (On Linux the `extra_hosts` entry in
# docker-compose.yml provides the same mapping.)
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'developer-platform-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3333']
